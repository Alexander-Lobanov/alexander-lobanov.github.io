# %%%%26.04.2026%%%%%%% GitHub Pages Scholar sync
name: Deploy GitHub Pages

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Update Google Scholar stats
        shell: pwsh
        env:
          SCHOLAR_SYNC_OPTIONAL: "true"
        run: ./scripts/update-scholar-stats.ps1

      - name: Commit updated Scholar snapshot
        shell: bash
        run: |
          if git diff --quiet -- assets/js/scholar-stats.js; then
            echo "No Scholar stats changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/scholar-stats.js
          git commit -m "chore: update Google Scholar stats"
          git push

      - name: Build Pages artifact
        shell: pwsh
        run: ./scripts/build-pages-artifact.ps1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
# %%%%26.04.2026%%%%%%% GitHub Pages Scholar sync
